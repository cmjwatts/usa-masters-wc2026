name: Update results & social content

# TEMPORARILY in verify-only mode on this branch: runs the real scraper
# against live AltiusRT and prints the output without committing, so we can
# confirm the parser fix end-to-end. Will be restored to the scheduled
# commit-and-push version (as on main) before merge.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Scrape AltiusRT results (verify only)
        run: |
          node scripts/scrape-results.mjs
          echo "=== js/results.js ==="
          cat js/results.js
          echo "=== js/results-aug.js ==="
          cat js/results-aug.js
