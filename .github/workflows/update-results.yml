name: Update results & social content

on:
  workflow_dispatch: {}        # manual "Run workflow" button
  schedule:
    # Pre-tournament: once a day for countdown posts (UTC).
    - cron: "0 7 5-21 7 *"          # July 5-21, 07:00 UTC (09:00 NL)
    # Window 1 (Schiedam/Rotterdam, July 22-Aug 1): every 20 min during
    # the tournament (UTC; games run 6:00-19:00 UTC).
    - cron: "*/20 6-20 22-31 7 *"   # July 22-31
    - cron: "*/20 6-20 1-2 8 *"     # August 1
    # Gap between windows: back to a daily countdown cron.
    - cron: "0 7 2-5 8 *"           # August 2-5, 07:00 UTC (09:00 NL)
    # Window 2 (Brasschaat/Breda, Aug 6-16): every 20 min during the
    # tournament (UTC; games run 6:00-19:00 UTC, same as window 1).
    - cron: "*/20 6-20 6-16 8 *"    # August 6-16

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_APP_PASSWORD: ${{ secrets.MAIL_APP_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Scrape AltiusRT results
        run: node scripts/scrape-results.mjs

      - name: Install deps (slide renderer)
        run: npm ci

      - name: Generate social posts & carousel slides
        run: node scripts/generate-social.mjs

      - name: Check for new posts
        id: newposts
        run: echo "count=$(node -p "JSON.parse(require('fs').readFileSync('social-new.json','utf8')).length")" >> "$GITHUB_OUTPUT"

      - name: Commit & push if anything changed
        run: |
          git add js/results.js js/results-aug.js social/
          if git diff --cached --quiet; then
            echo "No new results or social posts."
          else
            git config user.name "results-bot"
            git config user.email "actions@github.com"
            git commit -m "Auto-update: results + social content"
            git push
          fi

      # Email Christine + Melissa when new posts land. Needs two repo
      # secrets: MAIL_USERNAME (the Gmail address to send from) and
      # MAIL_APP_PASSWORD (a Google "app password" for that account).
      # Skips quietly if the secrets aren't set.
      - name: Build notification email
        if: steps.newposts.outputs.count != '0' && env.MAIL_APP_PASSWORD != ''
        id: email
        run: |
          node scripts/build-email.mjs
          echo "subject=$(cat email-subject.txt)" >> "$GITHUB_OUTPUT"

      - name: Email the social team
        if: steps.newposts.outputs.count != '0' && env.MAIL_APP_PASSWORD != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ env.MAIL_USERNAME }}
          password: ${{ env.MAIL_APP_PASSWORD }}
          subject: ${{ steps.email.outputs.subject }}
          to: cmwatts02@gmail.com,mkatzdesigns@gmail.com
          from: USA Masters Social Kit <${{ env.MAIL_USERNAME }}>
          html_body: file://email.html
