name: Update results & social content

# TEMPORARILY converted to a debug fetcher on this branch only — the dev
# sandbox can't reach masters.altiusrt.com, so we use the Actions runner to
# capture the real HTML the scraper sees. Will be restored before merge.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch competition pages
        run: |
          mkdir -p out
          for id in 478 494; do
            curl -sS -L -A "Mozilla/5.0 (usa-masters-wc2026 fan hub)" \
              "https://masters.altiusrt.com/competitions/$id/matches" \
              -o "out/comp$id-matches.html" -w "comp $id matches: %{http_code} %{size_download} bytes\n"
          done
          echo "--- first 3000 chars of comp478-matches.html ---"
          head -c 3000 out/comp478-matches.html
      - uses: actions/upload-artifact@v4
        with:
          name: altiusrt-pages
          path: out/
