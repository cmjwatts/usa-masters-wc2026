name: Update results & social content

# TEMPORARILY a status-probe on this branch: prints every match row's
# status cell from the live AltiusRT pages so we can see what statuses
# finished games move to. Will be restored before merge.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Probe match row statuses
        run: |
          for id in 478 480 481; do
            echo "=== competition $id ==="
            curl -sS -L -A "Mozilla/5.0 (usa-masters-wc2026 fan hub)" \
              "https://masters.altiusrt.com/competitions/$id/matches" \
            | python3 -c '
          import re, sys
          html = sys.stdin.read()
          strip = lambda h: re.sub(r"\s+", " ", re.sub(r"<[^>]+>", " ", h)).strip()
          for row in re.split(r"<tr[\s>]", html)[1:]:
              cells = [strip(m.group(1)) for m in re.finditer(r"<td[^>]*>([\s\S]*?)</td>", row)]
              if len(cells) < 6 or " v " not in cells[2]:
                  continue
              print(" | ".join(cells[1:5]))
          '
          done
