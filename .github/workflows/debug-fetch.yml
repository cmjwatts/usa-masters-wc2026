# Temporary debug workflow: fetch AltiusRT pages from the Actions runner
# (this repo's dev sandbox can't reach masters.altiusrt.com directly) so we
# can inspect the real HTML the scraper sees. Safe to delete after debugging.
name: Debug fetch AltiusRT

on:
  workflow_dispatch: {}

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch competition pages
        run: |
          mkdir -p out
          for id in 478 494; do
            curl -sS -L -A "Mozilla/5.0 (usa-masters-wc2026 fan hub)" \
              "https://masters.altiusrt.com/competitions/$id/matches" \
              -o "out/comp$id-matches.html" -w "comp $id matches: %{http_code} %{size_download} bytes\n"
            curl -sS -L -A "Mozilla/5.0 (usa-masters-wc2026 fan hub)" \
              "https://masters.altiusrt.com/competitions/$id" \
              -o "out/comp$id.html" -w "comp $id root: %{http_code} %{size_download} bytes\n"
          done
          echo "--- first 3000 chars of comp478-matches.html ---"
          head -c 3000 out/comp478-matches.html
      - uses: actions/upload-artifact@v4
        with:
          name: altiusrt-pages
          path: out/
