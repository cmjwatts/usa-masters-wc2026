<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meet the WO35 Team — USA Masters WC2026</title>
  <meta name="description" content="Meet the USA Women's O35 Masters field hockey team headed to the 2026 WMH World Cup in Schiedam, Netherlands — player cards for the whole squad.">
  <link rel="canonical" href="https://usamastersfh.com/team.html">
  <!-- Social share card -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="USA Masters Fan Hub">
  <meta property="og:title" content="Meet the USA WO35 Team — 2026 World Cup">
  <meta property="og:description" content="The whole squad, trading-card style. USA Women's O35 at the WMH World Cup, Schiedam, July 22 – Aug 1.">
  <meta property="og:url" content="https://usamastersfh.com/team.html">
  <meta property="og:image" content="https://usamastersfh.com/assets/team-photo.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Meet the USA WO35 Team — 2026 World Cup">
  <meta name="twitter:description" content="The whole squad, trading-card style. USA Women's O35 at the WMH World Cup, Schiedam, July 22 – Aug 1.">
  <meta name="twitter:image" content="https://usamastersfh.com/assets/team-photo.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:ital,wght@0,400;0,600;0,700;0,900;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="assets/favicon.png" type="image/png">
</head>
<body>

  <!-- ============ NAV ============ -->
  <header class="nav" id="top">
    <a class="nav-brand" href="./">
      <img id="navLogo" src="assets/logo.png" alt="USA Field Hockey Masters"
           onerror="this.style.display='none';document.getElementById('navFallback').style.display='flex'">
      <span id="navFallback" class="nav-fallback" style="display:none">
        <svg class="nav-mark" viewBox="0 0 100 100" aria-hidden="true">
          <circle cx="58" cy="13" r="10" fill="var(--navy)"/>
          <path d="M64 27 C74 40 66 55 54 64 C46 70 38 76 30 81" fill="none" stroke="var(--navy)" stroke-width="11" stroke-linecap="round"/>
          <path d="M60 32 C55 54 42 70 22 79 C16 82 10 82 7 79" fill="none" stroke="var(--red)" stroke-width="7" stroke-linecap="round"/>
          <circle cx="13" cy="90" r="5" fill="var(--navy)"/>
        </svg>
        <span class="lockup"><b class="lk-usa">USA</b><b class="lk-fh">Field Hockey</b></span>
        <span class="lk-bar"></span>
        <b class="lk-masters">MASTERS</b>
      </span>
    </a>
    <nav class="nav-links">
      <a href="july.html" id="schedLink">Schedule</a>
      <a href="./">All USA teams</a>
    </nav>
  </header>

  <!-- ============ HEADER ============ -->
  <main>
  <section class="section" id="roster">
    <div class="section-head">
      <h2 id="rosterTitle">Meet<br>the team<span style="color:var(--red)">.</span></h2>
      <p id="rosterSub"></p>
    </div>
    <div class="roster-grid" id="rosterGrid"></div>
    <p class="roster-note" id="rosterNote"></p>
  </section>
  </main>

  <footer class="footer">
    <p><b>GO USA! 🇺🇸🏑</b></p>
    <p>An unofficial fan hub made with love by a USA WO35 family. Always confirm times against official sources.</p>
    <p><a href="https://www.instagram.com/usamastersfh/">@usamastersfh</a></p>
    <p>Built by <a href="https://christinewatts.com" target="_blank" rel="noopener">Christine Watts</a></p>
  </footer>

  <script src="js/nav.js"></script>
  <script src="js/roster.js"></script>
  <script>
    (function () {
      const esc = (s) => String(s ?? "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
      const initials = (name) => name.split(/\s+/).filter(Boolean).map((w) => w[0]).join("").slice(0, 3).toUpperCase();

      // Which team? team.html?div=W40 etc. — defaults to WO35.
      const code = ROSTERS[new URLSearchParams(location.search).get("div")] ? new URLSearchParams(location.search).get("div") : "W35";
      const team = ROSTERS[code];
      const players = team.players;
      const total = players.length;

      document.title = `Meet the ${team.short} Team — USA Masters WC2026`;
      document.getElementById("rosterTitle").innerHTML = `Meet<br>the ${esc(team.short)}<span style="color:var(--red)">.</span>`;
      document.getElementById("rosterSub").textContent =
        `The USA ${team.label} squad taking the pitch at ${team.venue}, ${team.dates}. ` +
        (total ? "Tap any card to flip it over for the scouting report. 🇺🇸🏑" : "🇺🇸🏑");

      const sched = document.getElementById("schedLink");
      if (team.inJuly) { sched.textContent = `${team.short} Schedule`; sched.href = `july.html?div=${code}#schedule`; }
      else { sched.textContent = "Netherlands hub"; }

      const note = document.getElementById("rosterNote");
      if (total) {
        note.innerHTML = `📸 Player headshots &amp; favorite quotes are being collected — cards update as they come in.` +
          (team.inJuly ? ` Catch every ${esc(team.short)} game on the <a href="july.html?div=${code}#schedule">schedule</a>.` : "");
      } else {
        note.innerHTML = `🏑 The ${esc(team.short)} player cards are being put together — headshots, hometowns, colleges &amp; favorite quotes are on their way. Check back soon!`;
      }

      document.getElementById("rosterGrid").innerHTML = players.map((p, i) => {
        const no = String(i + 1).padStart(2, "0");
        const photoInner = (p.photo
          ? `<img src="${esc(p.photo)}" alt="${esc(p.name)}" loading="lazy" decoding="async">`
          : `<div class="pc-initials">${esc(initials(p.name))}<small>Headshot coming soon</small></div>`)
          + (p.number != null ? `<span class="pc-num">#${esc(p.number)}</span>` : "");
        const photoClass = p.photo ? "pc-photo" : "pc-photo no-photo";
        const meta = [
          p.hometown ? `<span>📍 ${esc(p.hometown)}</span>` : "",
          p.college ? `<span>🎓 ${esc(p.college)}</span>` : "",
        ].join("");
        const quote = p.quote
          ? `<p class="pc-quote">“${esc(p.quote)}”</p>`
          : `<p class="pc-quote placeholder">Favorite quote — coming soon…</p>`;
        const fact = p.fact || "Scouting report coming soon — this one lets her stick do the talking.";
        return `
        <div class="pcard" role="button" tabindex="0" aria-label="${esc(p.name)} — tap to flip card">
          <div class="pcard-inner">
            <div class="pcard-face pcard-front">
              <div class="pc-strip"><span>USA · WO35</span><span class="pc-no">№ ${no} / ${total}</span></div>
              <span class="pc-hint">Flip ↻</span>
              <div class="${photoClass}">${photoInner}</div>
              <h3 class="pc-name">${esc(p.name)}<i>.</i></h3>
              <p class="pc-pos">${esc(p.position || "USA Masters")}</p>
              <div class="pc-meta">${meta}</div>
              ${quote}
            </div>
            <div class="pcard-face pcard-back">
              <span class="pc-back-kicker">Scouting Report</span>
              <h3 class="pc-back-name">${esc(p.name)}</h3>
              <div class="pc-back-bar"></div>
              <p class="pc-fact">${esc(fact)}</p>
              <div class="pc-back-foot"><span>№ ${no} / ${total}</span><span>usamastersfh.com</span></div>
            </div>
          </div>
        </div>`;
      }).join("");

      document.querySelectorAll(".pcard").forEach((card) => {
        // .anim keeps the 3D context (and back face) alive only for the
        // duration of the flip — cards at rest are cheap 2D layers
        const flip = () => {
          card.classList.add("anim");
          card.classList.toggle("flipped");
        };
        card.querySelector(".pcard-inner").addEventListener("transitionend", () => {
          if (!card.classList.contains("flipped")) card.classList.remove("anim");
        });
        card.addEventListener("click", flip);
        card.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") { e.preventDefault(); flip(); }
        });
      });
    })();
  </script>
</body>
</html>
