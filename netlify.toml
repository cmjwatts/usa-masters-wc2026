# Cache headers only — deliberately no [build] section here. The Netlify
# site already has its build/publish settings configured in the dashboard;
# adding [build] in this file could silently override that config.

# Fonts never change once shipped under a given filename — cache forever.
[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Other assets (photos, etc.) may be swapped under the same filename as
# the roster/venues change, so cache for a day rather than forever.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Social carousel slide images are additive (new files each run) and never
# regenerated in place under the same name — safe to cache forever.
[[headers]]
  for = "/social/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Results are rewritten roughly every 20 minutes during the tournament, so
# keep the cache window short and force a revalidation check after it expires.
[[headers]]
  for = "/js/results.js"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/js/results-aug.js"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Clean-URL scheme: pages live on disk as .html (index.html, july.html,
# brasschaat.html, breda.html, team.html, social.html) so Netlify's default
# extensionless serving keeps working, but every public-facing link should
# point at the extensionless path. These force redirects catch anyone who
# still has an old *.html link (social posts, bookmarks, search results)
# and send them to the clean URL instead of serving duplicate content at
# both paths. force = true is required because Netlify only redirects an
# existing static file when forced; query strings pass through untouched.
[[redirects]]
  from = "/july.html"
  to = "/july"
  status = 301
  force = true

[[redirects]]
  from = "/brasschaat.html"
  to = "/brasschaat"
  status = 301
  force = true

[[redirects]]
  from = "/breda.html"
  to = "/breda"
  status = 301
  force = true

[[redirects]]
  from = "/team.html"
  to = "/team"
  status = 301
  force = true

[[redirects]]
  from = "/social.html"
  to = "/social"
  status = 301
  force = true
